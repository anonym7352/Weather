<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wetter Engine</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; padding: 10px; }
        .container { max-width: 600px; margin: auto; }
        input, button { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8em; margin-top: 15px; }
        th, td { border: 1px solid #333; padding: 4px; text-align: left; }
        .warning { color: #ffaa00; font-size: 0.7em; margin-bottom: 10px; }
        h1 { font-size: 1.2em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wetter Data Terminal v1.0</h1>
        <input type="text" id="cityInput" placeholder="Stadtname...">
        <input type="date" id="dateInput">
        <button onclick="searchCity()">Daten abrufen</button>
        <button onclick="getLocation()">GPS Standort</button>

        <div id="status" class="warning"></div>
        <div id="results"></div>
    </div>

    <script>
        // Setze Datum auf heute
        document.getElementById('dateInput').valueAsDate = new Date();

        async function fetchWeather(lat, lon, name) {
            const date = document.getElementById('dateInput').value;
            const status = document.getElementById('status');
            status.innerText = "Query: Requesting ICON-D2 Model data...";
            
            // minutely_15 für den gesamten Tag
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&start_date=${date}&end_date=${date}&minutely_15=temperature_2m,precipitation,cloud_cover,precipitation_probability`;
            
            try {
                const response = await fetch(url);
                const data = await response.json();
                renderData(data, name);
            } catch (e) {
                status.innerText = "ERROR: Fetch failed.";
            }
        }

        function renderData(data, name) {
            const container = document.getElementById('results');
            container.innerHTML = `<h2>Ort: ${name}</h2>`;
            
            let html = '<table><tr><th>Uhr</th><th>°C</th><th>Regen mm</th><th>Wolken %</th></tr>';
            
            // Alle Datenpunkte durchgehen (96 Stk für 15-Min-Takt)
            for(let i = 0; i < data.minutely_15.time.length; i++) {
                // Wir zeigen nur jede 4. Zeile (jede Stunde), um es auf dem Handy lesbar zu halten
                // Wenn du alle 15 Min willst, nimm if (true)
                if (i % 4 === 0) { 
                    const time = data.minutely_15.time[i].split('T')[1].substring(0,5);
                    html += `<tr>
                        <td>${time}</td>
                        <td>${data.minutely_15.temperature_2m[i]}</td>
                        <td>${data.minutely_15.precipitation[i]}</td>
                        <td>${data.minutely_15.cloud_cover[i]}</td>
                    </tr>`;
                }
            }
            html += '</table>';
            container.innerHTML += html;
        }

        async function searchCity() {
            const city = document.getElementById('cityInput').value;
            const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}`);
            const data = await res.json();
            if (data.results) {
                fetchWeather(data.results[0].latitude, data.results[0].longitude, data.results[0].name);
            } else {
                alert("Location not found.");
            }
        }

        function getLocation() {
            if (!navigator.geolocation) { alert("GPS not supported"); return; }
            navigator.geolocation.getCurrentPosition(pos => {
                fetchWeather(pos.coords.latitude, pos.coords.longitude, "GPS Position");
            }, err => alert("GPS denied."));
        }
    </script>
</body>
</html>
