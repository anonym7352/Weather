<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Engineering Terminal v7.0</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; padding: 10px; }
        .container { max-width: 1000px; margin: auto; }
        .block { border: 1px solid #00ff41; padding: 10px; margin: 10px 0; background: #0a0a0a; font-size: 0.85em; }
        .warning { color: #ff3333; font-weight: bold; }
        .table-container { overflow-x: auto; border: 1px solid #00ff41; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.7em; }
        th { position: sticky; top: 0; background: #000; padding: 6px; border: 1px solid #00ff41; }
        td { border: 1px solid #333; padding: 4px; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weather Engineering Terminal v7.0</h1>
        <input type="text" id="cityInput" placeholder="Stadtname...">
        <button onclick="searchCity()">Abrufen</button>
        
        <div id="analysis-output"></div> <!-- Hier kommen die Berichte hin -->
        <div id="results"></div>
    </div>

    <script>
        async function fetchWeather(lat, lon, name) {
            const date = new Date().toISOString().split('T')[0];
            const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&start_date=${date}&end_date=${date}&minutely_15=temperature_2m,precipitation,cloud_cover,shortwave_radiation,uv_index&timezone=auto`;
            const res = await fetch(url);
            const data = await res.json();
            generateAnalysis(data);
        }

        function generateAnalysis(data) {
            const container = document.getElementById('analysis-output');
            container.innerHTML = "<h2>Analytische Tageszusammenfassung</h2>";
            
            // Tagesabschnitte definieren (Indices für 15-Min-Daten)
            const periods = [
                { name: "Früh (00-06h)", start: 0, end: 24 },
                { name: "Vormittag (06-12h)", start: 24, end: 48 },
                { name: "Mittag/Nachmittag (12-18h)", start: 48, end: 72 },
                { name: "Abend (18-24h)", start: 72, end: 96 }
            ];

            periods.forEach(p => {
                let rainDetected = false;
                let sunHigh = false;
                let warnings = [];

                for (let i = p.start; i < p.end; i++) {
                    if (data.minutely_15.precipitation[i] > 0.5) {
                        rainDetected = true;
                        warnings.push(`Regen um ${data.minutely_15.time[i].split('T')[1].substring(0,5)}`);
                    }
                    if (data.minutely_15.shortwave_radiation[i] > 500) sunHigh = true;
                }

                container.innerHTML += `
                    <div class="block">
                        <strong>${p.name}:</strong> ${rainDetected ? "Regen möglich" : "Trocken"}, 
                        Sonne: ${sunHigh ? "Stark" : "Wenig"}.
                        ${warnings.length > 0 ? `<br><span class="warning">WARNUNG: ${warnings.join(", ")}</span>` : ""}
                    </div>`;
            });
        }
    </script>
</body>
</html>
