<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Weather Engineering Terminal v9.7</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', Courier, monospace; padding: 10px; }
        .container { max-width: 1000px; margin: auto; }
        input, button, select { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        
        .phase-panel { border: 1px solid #00ff41; padding: 10px; margin: 10px 0; background: #0a0a0a; font-size: 0.85em; }
        .warning { color: #ff3333; font-weight: bold; border: 1px solid #ff3333; padding: 4px; margin-top: 5px; }
        
        .table-container { overflow-y: auto; max-height: 40vh; border: 1px solid #00ff41; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.70em; }
        th { position: sticky; top: 0; background: #000; padding: 8px; border: 1px solid #00ff41; z-index: 10; }
        td { border: 1px solid #333; padding: 5px; text-align: right; }
        
        .current-row { border: 2px solid #ff3333 !important; background: #330000; color: #fff; }
        .arrow { color: #ff3333; font-weight: bold; margin-right: 5px; }
        
        #status-bar { font-size: 0.8em; color: #aaa; margin-bottom: 10px; }
        details { border: 1px solid #333; margin-top: 10px; padding: 10px; font-size: 0.8em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weather Engineering Console v9.7</h1>
        <div id="status-bar">Status: Bereit</div>
        <div id="locationDisplay" style="font-weight: bold; margin-bottom: 10px; color: #fff;">Kein Standort</div>
        
        <input type="text" id="cityInput" placeholder="Stadtname...">
        <input type="date" id="dateInput">
        <select id="modeSelect">
            <option value="forecast">Vorhersage (15-Min)</option>
            <option value="archive">Historie (1-Std)</option>
        </select>
        <button onclick="fetchData()">Daten abrufen</button>
        <button onclick="getLocation()">GPS Standort</button>
        
        <div id="meta-info" style="font-size: 0.75em; color: #888;"></div>
        <div id="summary-container"></div>
        
        <details open><summary>Parameter Legende</summary><ul>
            <li><strong>°C:</strong> Lufttemp (Schatten).</li>
            <li><strong>Rad (W/m²):</strong> Einstrahlung.</li>
            <li><strong>UV:</strong> 0-2=Niedrig, 6+=Hoch.</li>
            <li><strong>Cloud%:</strong> Bewölkungsgrad.</li>
            <li><strong>Regen:</strong> mm je Intervall.</li>
            <li><strong>Wind/Böe:</strong> km/h.</li>
        </ul></details>
        
        <div id="results"></div>
    </div>

    <script>
        let updateTimer = null;
        let secondsLeft = 60; // Startzeit in Sekunden (entspricht 1 Minute)
        let lastDataTime = "";
        document.getElementById('dateInput').valueAsDate = new Date();
        let lastQuery = null;

        function setStatus(msg) { document.getElementById('status-bar').innerText = "Status: " + msg; }

        async function fetchData(lat, lon, name, country) {
            setStatus("wird geladen...");
            if(!lat) {
                const city = document.getElementById('cityInput').value;
                if(!city) { setStatus("Fehler: Keine Stadt!"); return; }
                const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${city}`);
                const data = await res.json();
                if(!data.results) { setStatus("Stadt nicht gefunden."); return; }
                lat = data.results[0].latitude; lon = data.results[0].longitude;
                name = data.results[0].name; country = data.results[0].country;
            }

            const mode = document.getElementById('modeSelect').value;
            const date = document.getElementById('dateInput').value;
            const baseUrl = (mode === 'archive') ? "https://archive-api.open-meteo.com/v1/archive" : "https://api.open-meteo.com/v1/forecast";
            const intervalParam = (mode === 'archive') ? "hourly" : "minutely_15";
            
            const url = `${baseUrl}?latitude=${lat}&longitude=${lon}&start_date=${date}&end_date=${date}&${intervalParam}=temperature_2m,relative_humidity_2m,precipitation,precipitation_probability,cloud_cover,wind_speed_10m,wind_gusts_10m,uv_index,shortwave_radiation,weather_code,snowfall&timezone=auto`;
            
            lastQuery = {lat, lon, name, country};
            const resWeather = await fetch(url);
            const wData = await resWeather.json();
            
            document.getElementById('locationDisplay').innerText = `${name}, ${country}`;
            setStatus("Daten aktuell");
            
            const d = {
                time: wData[intervalParam].time,
                temp: wData[intervalParam].temperature_2m,
                rad: wData[intervalParam].shortwave_radiation,
                uv: wData[intervalParam].uv_index,
                hum: wData[intervalParam].relative_humidity_2m,
                rain: wData[intervalParam].precipitation,
                prob: wData[intervalParam].precipitation_probability,
                wind: wData[intervalParam].wind_speed_10m,
                gust: wData[intervalParam].wind_gusts_10m,
                code: wData[intervalParam].weather_code,
                snow: wData[intervalParam].snowfall,
                cloud: wData[intervalParam].cloud_cover
            };
            
            renderAll(d, name);
            lastDataTime = new Date().toLocaleTimeString(); // Zeit fixieren
            startCountdown(60);
        }

        function renderAll(d, name) {
            const container = document.getElementById('summary-container');
            container.innerHTML = `<h2>Analyse: ${name}</h2>`;
            
            // 3-Stunden Blöcke (24h / 3h = 8 Blöcke)
            const chunks = 8; 
            const step = Math.floor(d.time.length / chunks);
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();

            for (let i = 0; i < chunks; i++) {
                let start = i * step;
                let end = start + step;
                if (end > d.time.length) end = d.time.length;
                let slice = d.time.slice(start, end);
                if (slice.length === 0) continue;

                let avgT = d.temp.slice(start, end).reduce((a,b)=>a+b, 0) / slice.length;
                let maxW = Math.max(...d.wind.slice(start, end));
                let sumR = d.rain.slice(start, end).reduce((a,b)=>a+b, 0);
                let maxS = Math.max(...d.rad.slice(start, end));
                let avgCloud = d.cloud.slice(start, end).reduce((a,b)=>a+b, 0) / slice.length;

                // Präzisere Text-Logik
                let desc = `<b>${d.time[start].split('T')[1].substring(0,5)} - ${d.time[end-1].split('T')[1].substring(0,5)} Uhr:</b><br>`;
                
                // Temperatur
                if (avgT < 5) desc += "🥶 Eiskalt (" + avgT.toFixed(1) + "°C), ";
                else if (avgT < 15) desc += "🧊 Kühl (" + avgT.toFixed(1) + "°C), ";
                else if (avgT < 25) desc += "☀️ Mild (" + avgT.toFixed(1) + "°C), ";
                else desc += "🔥 Heiß (" + avgT.toFixed(1) + "°C), ";

                // Bewölkung & Sonne
                if (avgCloud > 80) desc += "bedeckt";
                else if (avgCloud > 50) desc += "bewölkt";
                else if (avgCloud > 20) desc += "leicht bewölkt";
                else desc += "klar";

                desc += (maxS > 400 ? " (Sonne stark)" : maxS > 150 ? " (Sonne schwach)" : " (trüb)");

                // Regen
                if (sumR > 3) desc += "<br>⚠️ Starker Regen (" + sumR.toFixed(1) + "mm)!";
                else if (sumR > 0.2) desc += "<br>☔ Leichter Regen (" + sumR.toFixed(1) + "mm).";
                else desc += "<br>✅ Trocken.";

                // Wind
                if (maxW > 50) desc += " | 💨 Sturm (" + Math.round(maxW) + "km/h)";
                else if (maxW > 30) desc += " | 💨 Windig (" + Math.round(maxW) + "km/h)";
                else desc += " | 🍃 Windstill";

               let alerts = [];
                let ongoing = {}; // Speichert aktive Ereignisse: { "Titel": { start: "HH:MM" } }

                for(let j = start; j < end; j++) {
                    const c = d.code[j];
                    const time = d.time[j].split('T')[1].substring(0,5);
                    let currentFlags = [];

                    // Bedingungen prüfen
                    if([95, 96, 99].includes(c)) currentFlags.push("⚠️ GEWITTER");
                    if([66, 67, 56, 57].includes(c)) currentFlags.push("⚠️ GLATTEISGEFAHR");
                    if(d.snow[j] > 0) currentFlags.push(`❄️ SCHNEEFALL (${d.snow[j]}cm)`);
                    if(c >= 71 && c <= 77) currentFlags.push("❄️ SCHNEESCHAUER");
                    if(c === 96 || c === 99) currentFlags.push("⚡ HAGEL MÖGLICH");
                    if(d.gust[j] > 50) currentFlags.push(`💨 BÖE (${d.gust[j]}km/h)`);

                    // Neue oder andauernde Ereignisse tracken
                    currentFlags.forEach(flag => {
                        if(!ongoing[flag]) ongoing[flag] = { start: time, last: time };
                        else ongoing[flag].last = time;
                    });

                    // Ereignisse, die gerade enden, abschließen
                    Object.keys(ongoing).forEach(key => {
                        if(!currentFlags.includes(key)) {
                            let duration = (ongoing[key].start === ongoing[key].last) ? ongoing[key].start : `${ongoing[key].start}-${ongoing[key].last}`;
                            alerts.push(`${key} (${duration} Uhr)`);
                            delete ongoing[key];
                        }
                    });
                }

                // Alle Ereignisse, die am Ende des Blocks noch aktiv sind, abschließen
                Object.keys(ongoing).forEach(key => {
                    let duration = (ongoing[key].start === ongoing[key].last) ? ongoing[key].start : `${ongoing[key].start}-${ongoing[key].last}`;
                    alerts.push(`${key} (${duration} Uhr)`);
                });
                
                let alertHtml = alerts.length > 0 ? `<div class="warning">${alerts.slice(0,1).join('<br>')}</div>` : "";
                container.innerHTML += `<div class="phase-panel">${desc}${alertHtml}</div>`;
            }

            // Tabelle
            const now = new Date();
            const currentBlock = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')}T${now.getHours().toString().padStart(2,'0')}:${(Math.floor(now.getMinutes()/15)*15).toString().padStart(2,'0')}`;
            
            let html = `<div class="table-container"><table><tr><th>Zeit</th><th>°C</th><th>Rad</th><th>UV</th><th>Cloud%</th><th>Regen</th><th>P%</th><th>Wind</th><th>Böe</th></tr>`;
            for(let i = 0; i < d.time.length; i++) {
                const isCurrent = d.time[i].startsWith(currentBlock);
                html += `<tr class="${isCurrent ? 'current-row' : ''}">
                    <td>${isCurrent ? '<span class="arrow">></span>' : ''}${d.time[i].split('T')[1].substring(0,5)}</td>
                    <td>${d.temp[i]}</td><td>${Math.round(d.rad[i]||0)}</td><td>${d.uv[i]||0}</td>
                    <td>${d.cloud[i]}%</td><td>${d.rain[i]}</td><td>${d.prob[i]||0}</td>
                    <td>${d.wind[i]}</td><td>${d.gust[i]}</td></tr>`;
            }
            container.innerHTML += html + '</table></div>';
        }

        function getLocation() {
            setStatus("GPS wird gesucht...");
            navigator.geolocation.getCurrentPosition(pos => {
                setStatus("GPS gefunden, lade Daten...");
                fetchData(pos.coords.latitude, pos.coords.longitude, "GPS Position", "Lokaler Standort");
            }, () => setStatus("GPS Fehler"));
        }

                // Automatische Aktualisierung alle 10 Sekunden (10000 ms)
        setInterval(async () => {
            if (lastQuery) {
                // 1. Aktuelle Scroll-Position des Tabellen-Containers merken
                const tableContainer = document.querySelector('.table-container');
                const scrollPos = tableContainer ? tableContainer.scrollTop : 0;
        
                // 2. Daten neu abrufen und rendern
                await fetchData(lastQuery.lat, lastQuery.lon, lastQuery.name, lastQuery.country);
        
                // 3. Scroll-Position sofort wiederherstellen
                const newTableContainer = document.querySelector('.table-container');
                if (newTableContainer) {
                    newTableContainer.scrollTop = scrollPos;
                }
            }
        }, 60000);

        function startCountdown(duration) {
    if (updateTimer) clearInterval(updateTimer);
    secondsLeft = duration;

    const metaInfo = document.getElementById('meta-info');

    updateTimer = setInterval(() => {
        secondsLeft--;
        const mins = Math.floor(secondsLeft / 60);
        const secs = secondsLeft % 60;
        
        metaInfo.innerText = `Datenstand: ${lastDataTime} | Nächstes Update in: ${mins}:${secs.toString().padStart(2, '0')} Min.`;

        if (secondsLeft <= 0) {
            clearInterval(updateTimer);
            metaInfo.innerText = "Daten werden aktualisiert...";
        }
    }, 1000);
}
    </script>
</body>
</html>
